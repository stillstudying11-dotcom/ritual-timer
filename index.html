<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Study Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
    transition: background-color 4s ease;
  }

  /* ── Background layers ── */
  #bg-focus, #bg-break {
    position: fixed; inset: 0;
    transition: opacity 4s ease;
    pointer-events: none;
  }

  #bg-focus {
    background: #ffd699;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(255,210,140,0.6) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(255,180,80,0.25) 0%, transparent 55%);
  }

  #bg-break {
    background: #fff3c2;
    background-image:
      radial-gradient(ellipse at 70% 15%, rgba(255,245,180,0.7) 0%, transparent 55%),
      radial-gradient(ellipse at 25% 85%, rgba(255,230,100,0.2) 0%, transparent 50%);
    opacity: 0;
  }

  /* ── Grain overlay ── */
  #grain {
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; opacity: 0.4;
  }

  /* ── Decorative circles ── */
  .deco-circle {
    position: fixed; border-radius: 50%;
    pointer-events: none;
    transition: opacity 4s ease, background 4s ease;
  }
  .c1 { width: 520px; height: 520px; top: -140px; left: -140px;
        background: rgba(255,180,60,0.13); border: 1px solid rgba(200,130,30,0.12); }
  .c2 { width: 340px; height: 340px; bottom: -80px; right: -60px;
        background: rgba(255,200,80,0.10); border: 1px solid rgba(200,160,40,0.10); }
  .c3 { width: 180px; height: 180px; top: 60px; right: 200px;
        background: rgba(255,210,120,0.08); border: 1px solid rgba(200,150,40,0.08); }

  /* ── Top label ── */
  #session-label {
    position: fixed; top: 72px; left: 0; right: 0;
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 28px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(120,70,10,0.55);
    transition: opacity 1.5s ease;
  }

  /* ── Central timer ── */
  #timer-wrap {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
  }

  #timer-ring-wrap {
    position: relative;
    width: 480px; height: 480px;
    display: flex; align-items: center; justify-content: center;
  }

  #ring-svg {
    position: absolute; inset: 0;
    transform: rotate(-90deg);
  }

  #ring-bg { fill: none; stroke: rgba(160,100,20,0.1); stroke-width: 3; }
  #ring-prog {
    fill: none;
    stroke: rgba(180,110,20,0.35);
    stroke-width: 3;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 4s ease;
  }

  #timer-display {
    font-family: 'Playfair Display', serif;
    font-size: 128px;
    font-weight: 400;
    color: rgba(100,55,5,0.85);
    letter-spacing: -0.02em;
    line-height: 1;
    text-align: center;
    position: relative;
    z-index: 2;
    text-shadow: 0 4px 32px rgba(160,100,20,0.12);
    transition: opacity 1.5s ease;
  }

  #session-type {
    margin-top: 28px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(140,85,10,0.5);
    transition: opacity 1.5s ease, color 4s ease;
  }

  /* ── Bottom ornament ── */
  #bottom-text {
    position: fixed; bottom: 68px; left: 0; right: 0;
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 0.22em;
    color: rgba(140,85,10,0.35);
  }

  /* ── Divider lines ── */
  .divider {
    position: fixed; left: 50%; transform: translateX(-50%);
    width: 1px; background: rgba(160,100,20,0.15);
  }
  .divider-top { top: 120px; height: 80px; }
  .divider-bottom { bottom: 120px; height: 80px; }

  /* ── Session counter dots ── */
  #dots {
    position: fixed; bottom: 110px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 14px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(160,100,20,0.2);
    transition: background 0.6s ease;
  }
  .dot.done { background: rgba(160,100,20,0.55); }

  /* ── Transition overlay ── */
  #fade-overlay {
    position: fixed; inset: 0;
    background: rgba(255,230,160,0.0);
    pointer-events: none;
    transition: background 2.5s ease;
    z-index: 10;
  }

  /* ── Start button ── */
  #start-btn {
    position: fixed; bottom: 160px; left: 50%; transform: translateX(-50%);
    background: rgba(160,100,20,0.12);
    border: 1px solid rgba(160,100,20,0.25);
    color: rgba(100,55,5,0.8);
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 0.22em;
    padding: 14px 44px;
    cursor: pointer;
    border-radius: 2px;
    text-transform: uppercase;
    transition: all 0.3s ease;
  }
  #start-btn:hover { background: rgba(160,100,20,0.22); }

  /* Floating particles */
  .particle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    animation: floatUp 12s ease-in-out infinite;
  }
  @keyframes floatUp {
    0%   { opacity: 0; transform: translateY(0) scale(1); }
    20%  { opacity: 0.35; }
    80%  { opacity: 0.15; }
    100% { opacity: 0; transform: translateY(-220px) scale(0.5); }
  }
</style>
</head>
<body>

<div id="bg-focus"></div>
<div id="bg-break"></div>
<div id="grain"></div>

<div class="deco-circle c1"></div>
<div class="deco-circle c2"></div>
<div class="deco-circle c3"></div>

<div class="divider divider-top"></div>
<div class="divider divider-bottom"></div>

<div id="session-label">Deep Focus Session</div>

<div id="timer-wrap">
  <div id="timer-ring-wrap">
    <svg id="ring-svg" viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg">
      <circle id="ring-bg" cx="240" cy="240" r="220"/>
      <circle id="ring-prog" cx="240" cy="240" r="220"
              stroke-dasharray="1382.3" stroke-dashoffset="0"/>
    </svg>
    <div id="timer-display">50:00</div>
  </div>
  <div id="session-type">Focus · 1 of 1</div>
</div>

<div id="dots">
  <div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div>
  <div class="dot" id="d3"></div>
  <div class="dot" id="d4"></div>
</div>

<div id="bottom-text">stay present · stay focused</div>

<div id="fade-overlay"></div>

<button id="start-btn" onclick="startTimer()">Begin Session</button>

<!-- Floating particles added by JS -->

<script>
/* ── CONFIG ── */
const FOCUS_SEC   = 50 * 60;   // 50 min
const BREAK_SEC   = 10 * 60;   // 10 min
const TRANSITION  = 4000;       // 4 s cross-fade
const CIRCUMFERENCE = 2 * Math.PI * 220; // 1382.3

/* ── STATE ── */
let remaining   = FOCUS_SEC;
let totalTime   = FOCUS_SEC;
let isBreak     = false;
let running     = false;
let interval    = null;
let sessionCount = 0; // 0 = first focus, 1 = first break
let audioCtx    = null;
let tickNodes   = [];
let coffeeNodes = [];

/* ── DOM ── */
const disp    = document.getElementById('timer-display');
const label   = document.getElementById('session-label');
const stype   = document.getElementById('session-type');
const bgF     = document.getElementById('bg-focus');
const bgB     = document.getElementById('bg-break');
const ring    = document.getElementById('ring-prog');
const overlay = document.getElementById('fade-overlay');
const btn     = document.getElementById('start-btn');
const dots    = [d1,d2,d3,d4];

/* ── PARTICLES ── */
function makeParticles() {
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 4 + Math.random() * 10;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${5 + Math.random()*90}%;
      top:${20 + Math.random()*60}%;
      background: rgba(180,120,20,${0.04 + Math.random()*0.08});
      animation-delay: ${Math.random()*10}s;
      animation-duration: ${9 + Math.random()*8}s;
    `;
    document.body.appendChild(p);
  }
}
makeParticles();

/* ── AUDIO ── */
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function startTicking() {
  stopTicking();
  ensureAudio();
  // very soft metronome tick every ~1.2 seconds
  (function tick() {
    if (!running || isBreak) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.04);
    gain.gain.setValueAtTime(0.018, audioCtx.currentTime); // VERY soft
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.08);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
    tickNodes = [osc, gain];
    const id = setTimeout(tick, 1200);
    tickNodes.push({ clear: () => clearTimeout(id) });
  })();
}

function stopTicking() {
  tickNodes.forEach(n => { try { n.stop && n.stop(); n.disconnect && n.disconnect(); n.clear && n.clear(); } catch(e){} });
  tickNodes = [];
}

function startCoffee() {
  stopCoffee();
  ensureAudio();
  // Pink-ish noise for coffee pour
  const bufferSize = audioCtx.sampleRate * 3;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  for (let i = 0; i < bufferSize; i++) {
    const white = Math.random()*2-1;
    b0=0.99886*b0+white*0.0555179; b1=0.99332*b1+white*0.0750759;
    b2=0.96900*b2+white*0.1538520; b3=0.86650*b3+white*0.3104856;
    b4=0.55000*b4+white*0.5329522; b5=-0.7616*b5-white*0.0168980;
    data[i] = (b0+b1+b2+b3+b4+b5+b6+white*0.5362)*0.11;
    b6 = white*0.115926;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  src.loop = true;

  const gainNode = audioCtx.createGain();
  gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
  gainNode.gain.linearRampToValueAtTime(0.025, audioCtx.currentTime + 2); // fade in softly

  // gentle low-pass to make it sound warmer
  const lpf = audioCtx.createBiquadFilter();
  lpf.type = 'lowpass';
  lpf.frequency.value = 900;

  src.connect(lpf);
  lpf.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  src.start();
  coffeeNodes = [src, gainNode, lpf];
}

function stopCoffee() {
  if (coffeeNodes.length && audioCtx) {
    const g = coffeeNodes[1];
    try {
      g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);
      setTimeout(() => {
        coffeeNodes.forEach(n => { try { n.stop && n.stop(); n.disconnect && n.disconnect(); } catch(e){} });
        coffeeNodes = [];
      }, 1600);
    } catch(e) {}
  } else {
    coffeeNodes = [];
  }
}

/* ── FORMAT ── */
function fmt(s) {
  const m = Math.floor(s/60).toString().padStart(2,'0');
  const sec = (s%60).toString().padStart(2,'0');
  return `${m}:${sec}`;
}

/* ── RING ── */
function updateRing() {
  const pct = remaining / totalTime;
  const offset = CIRCUMFERENCE * (1 - pct);
  ring.style.strokeDashoffset = offset;
}

/* ── UPDATE DOTS ── */
function updateDots() {
  // session 0=focus1, 1=break1 → dots: 0,1 for focus done, 2,3 for break done
  dots.forEach((d,i) => d.classList.remove('done'));
  if (sessionCount >= 1) dots[0].classList.add('done');
  if (sessionCount >= 2) dots[1].classList.add('done');
  if (sessionCount >= 3) dots[2].classList.add('done');
  if (sessionCount >= 4) dots[3].classList.add('done');
}

/* ── TRANSITION ── */
function doTransition(cb) {
  overlay.style.background = 'rgba(255,230,160,0.55)';
  setTimeout(() => {
    cb();
    overlay.style.background = 'rgba(255,230,160,0)';
  }, TRANSITION / 2 + 200);
}

/* ── SESSION SWITCH ── */
function switchSession() {
  clearInterval(interval);
  running = false;
  sessionCount++;
  updateDots();

  doTransition(() => {
    isBreak = !isBreak;
    remaining = isBreak ? BREAK_SEC : FOCUS_SEC;
    totalTime  = isBreak ? BREAK_SEC : FOCUS_SEC;
    disp.textContent = fmt(remaining);
    updateRing();

    if (isBreak) {
      bgF.style.opacity = '0';
      bgB.style.opacity = '1';
      label.textContent = 'Break Time';
      stype.textContent = 'Rest & Recharge';
      ring.style.stroke = 'rgba(160,130,20,0.28)';
      stopTicking();
      startCoffee();
    } else {
      bgF.style.opacity = '1';
      bgB.style.opacity = '0';
      label.textContent = 'Deep Focus Session';
      stype.textContent = `Focus · ${Math.floor(sessionCount/2)+1} of 1`;
      ring.style.stroke = 'rgba(180,110,20,0.35)';
      stopCoffee();
      startTicking();
    }

    // auto-start next session
    setTimeout(() => beginCounting(), 800);
  });
}

/* ── COUNT ── */
function beginCounting() {
  running = true;
  interval = setInterval(() => {
    if (!running) return;
    remaining--;
    disp.textContent = fmt(remaining);
    updateRing();
    if (remaining <= 0) switchSession();
  }, 1000);
}

/* ── START ── */
function startTimer() {
  btn.style.display = 'none';
  ensureAudio();
  remaining = FOCUS_SEC;
  totalTime  = FOCUS_SEC;
  isBreak    = false;
  disp.textContent = fmt(remaining);
  updateRing();
  startTicking();
  beginCounting();
}
</script>
</body>
</html>
